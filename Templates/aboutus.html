{% extends 'dashboard.html' %}
{% block content %}
<h2>About us</h2>
{% if about %}
{% for ab in about%}
    <ul>{{ab.Description}}</ul>
<a href="{% url 'editabout' ab.id %}" class="btn btn-outline-warning">Edit</a>
{% endfor %}
{% else %}
<h4>Not added by admin</h4>
<a href="{% url 'addabout'  %}" class="btn btn-outline-warning">Add</a>
{% endif %}
{% endblock %}
