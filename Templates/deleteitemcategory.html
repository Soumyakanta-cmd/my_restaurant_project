{% extends "dashboard.html" %}

{% block content %}
<center>

<h2>Delete Category</h2>

<p>Are you sure you want to delete:</p>

<h3>{{ item.Category_name }}</h3>

<form method="post">
    {% csrf_token %}
    <button type="submit" style="background:red; color:white;">
        Yes, Delete
    </button>
</form>

<br>
<a href="{% url 'itemcategory' %}">Cancel</a>

</center>
{% endblock %}
