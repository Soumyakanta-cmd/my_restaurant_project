{% extends 'dashboard.html' %}
{% block content %}
<center>
    <h2>Delete Offer</h2>
    <p>Are you sure you want to delete:
    <h3>{{ offer.Item_name }}'s </h3>offer </p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background:red; color:white;">
        Yes, Delete
        </button>
    </form>
    <br>
    <a href="{% url 'offerus' %}">Cancel</a>
</center>
{% endblock %}
